<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Meme Feed</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
    }

    .feed {
      max-width: 700px;
      margin: auto;
      padding: 10px 10px 96px;
    }

    .meme {
      margin-bottom: 20px;
    }

    .meme img,
    .meme video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      background: black;
    }

    video {
      object-fit: contain;
    }

    .image-shell {
      position: relative;
      border-radius: 10px;
      background: black;
      overflow: hidden;
      min-height: 400px;
      width: 100%;
    }

    .image-shell::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      margin: -16px 0 0 -16px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: image-spinner 0.75s linear infinite;
    }

    .image-shell.is-loaded::before,
    .image-shell.is-error::before {
      display: none;
    }

    .image-shell img {
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .image-shell.is-loaded img,
    .image-shell.is-error img {
      opacity: 1;
    }

    @keyframes image-spinner {
      to {
        transform: rotate(360deg);
      }
    }

    .search-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 1000;
      padding: 0 16px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .search-box {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      pointer-events: auto;
    }

    .search-box input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(24, 24, 24, 0.94);
      color: white;
      padding: 18px 24px;
      font-size: 20px;
      text-align: center;
      outline: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    #floating-octocat {
      position: fixed;
      right: 16px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      width: 64px;
      height: 64px;
      object-fit: contain;
      z-index: 1001;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.92);
      border-radius: 42% / 46%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.55);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #floating-octocat.is-interactive {
      pointer-events: auto;
    }

    #floating-octocat.is-hovered {
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.75);
    }

    @media (max-width: 767px) {
      #floating-octocat {
        right: 12px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        width: 48px;
        height: 48px;
      }
    }

    @media (min-width: 768px) {
      .search-shell {
        padding: 0 20px;
      }

      .feed {
        padding-bottom: 110px;
      }

      #floating-octocat {
        right: 20px;
        bottom: calc(104px + env(safe-area-inset-bottom));
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-B6HJZb57.js"></script>
</head>

<body>

  <div class="feed" id="feed"></div>
  <div class="search-shell">
    <label class="search-box" for="search-input">
      <input id="search-input" type="search" placeholder="Search by filename" autocapitalize="none" autocomplete="off"
        autocorrect="off" spellcheck="false">
    </label>
  </div>
  <img id="floating-octocat" src="/assets/liberty-octocat-github-256-B7Ny_xBE.png" alt="Open meme-client on GitHub"
    role="link" tabindex="0">
</body>

</html>
